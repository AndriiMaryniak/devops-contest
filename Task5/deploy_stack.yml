---
- name: Automated deployment of Docker and WordPress (No hardcoded credentials)
  hosts: all
  become: yes
  
  vars_prompt:
    - name: my_secret_db_pass
      prompt: "\n[SECURITY] Enter the password for the WordPress database"
      private: yes

  tasks:
    - name: Step 1. Update APT package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Step 2. Install Docker and Compose plugin
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Step 3. Create project working directory
      file:
        path: /opt/my_wordpress_stack
        state: directory
        mode: '0755'

    - name: Step 4. Generate docker-compose.yml from Jinja2 template
      template:
        src: docker-compose.j2
        dest: /opt/my_wordpress_stack/docker-compose.yml

    - name: Step 5. Run the stack via Docker Compose
      command: docker compose up -d
      args:
        chdir: /opt/my_wordpress_stack
